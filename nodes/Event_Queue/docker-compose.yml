services:
  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  # Might not need the event-queue service,
  # run this on the host machine instead of in a container
  # may save memory and resources
  event-queue:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - EVENT_QUEUE_PORT=8082
