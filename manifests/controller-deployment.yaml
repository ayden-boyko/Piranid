apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: piranid
  labels:
    app: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller
  template:
    metadata:
      labels:
        app: controller
    spec:
      containers:
        - name: controller
          image: docker.io/library/piranid-controller:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: CONTROLLER_PORT
              value: "8080"
            - name: API_VERSION
              value: "v1"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: controller
  namespace: piranid
spec:
  selector:
    app: controller
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
