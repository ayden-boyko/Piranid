apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  namespace: piranid
  labels:
    app: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
        - name: notifications
          image: docker.io/library/piranid-notif:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          env:
            - name: NOTIFICATION_SERVICE_PORT
              value: "8084"
            - name: API_VERSION
              value: "v1"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: notifications
  namespace: piranid
spec:
  selector:
    app: notifications
  type: NodePort
  ports:
    - port: 8084
      targetPort: 8084
      nodePort: 30084
