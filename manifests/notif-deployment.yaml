apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  namespace: piranid
  labels:
    app: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
        - name: notifications
          image: docker.io/library/piranid-notifications:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          env:
            - name: NOTIFICATION_SERVICE_PORT
              value: "8084"
            - name: RABBIT_MQ_PORT
              value: "5672"
            - name: EVENT_SERVICE_WORKER_POOL_SIZE
              value: "5"
            - name: API_VERSION
              value: "v1"
            - name: COURIER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: courier-secret
                  key: COURIER_TOKEN
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: notifications
  namespace: piranid
spec:
  selector:
    app: notifications
  type: ClusterIP
  ports:
    - name: grpc
      port: 8084
      targetPort: 8084
      protocol: TCP
