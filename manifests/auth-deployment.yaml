apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization
  namespace: piranid
  labels:
    app: authorization
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authorization
  template:
    metadata:
      labels:
        app: authorization
    spec:
      containers:
        - name: authorization
          image: docker.io/library/piranid-auth:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: AUTH_SERVICE_PORT
              value: "8081"
            - name: API_VERSION
              value: "v1"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: authorization
  namespace: piranid
spec:
  selector:
    app: authorization
  type: NodePort
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
