apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-queue
  namespace: piranid
  labels:
    app: event-queue
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: event-queue
  template:
    metadata:
      labels:
        app: event-queue
    spec:
      containers:
      - name: event-queue
        image: docker.io/library/piranid-event:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
        env:
        - name: EVENT_QUEUE_PORT
          value: "8082"
        - name: API_VERSION
          value: "v1"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: event-queue
  namespace: piranid
spec:
  selector:
    app: event-queue
  type: NodePort
  ports:
  - port: 8082
    targetPort: 8082
    nodePort: 30082

